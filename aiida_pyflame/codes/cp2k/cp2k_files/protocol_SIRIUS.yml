opt1:
  kpoints_distance: 0.8
  GLOBAL:
    PREFERRED_DIAG_LIBRARY: SCALAPACK
    PRINT_LEVEL: MEDIUM
  FORCE_EVAL:
    METHOD: SIRIUS
    PW_DFT:
      CONTROL:
        VERBOSITY: 1
        MPI_GRID_DIMS: 1 4
        SPGLIB_TOLERANCE: 1.0E-6
      PARAMETERS:
        ELECTRONIC_STRUCTURE_METHOD: pseudopotential
        USE_SYMMETRY: TRUE
        PW_CUTOFF: 24
        GK_CUTOFF: 6
        NUM_DFT_ITER: 100
        SMEARING: GAUSSIAN
        SMEARING_WIDTH: 0.001 # Ha 0.01 eV
        DENSITY_TOL: 1.0E-5
      ITERATIVE_SOLVER:
        SUBSPACE_SIZE: 4
    DFT:
      XC:
        XC_FUNCTIONAL:
          GGA_X_PBE:
            _: ''
          GGA_C_PBE:
            _: ''    
    SUBSYS:
      CELL:
        A: "[angstrom]"        
        B: "[angstrom]"     
        C: "[angstrom]"
  MOTION:
    PRINT:
      TRAJECTORY:
        _: 'OFF'      
      RESTART:
        BACKUP_COPIES: 0
      RESTART_HISTORY:
        _: 'OFF'
      CELL:
        _: 'OFF'
      VELOCITIES:
        _: 'OFF'
      FORCES:
        _: 'OFF'
      STRESS:
        _: 'OFF'
    GEO_OPT:
      TYPE: MINIMIZATION
      OPTIMIZER: CG
      MAX_ITER:  200                 
      MAX_FORCE: "[bohr^-1*hartree] 0.0136"  # 0.7 eV/A
      RMS_FORCE: 0.01
      MAX_DR: 0.4
      RMS_DR: 0.2

