    DFT:
      XC:
        XC_FUNCTIONAL:
          GGA_X_PBE:
            _: ''
          GGA_C_PBE:
            _: ''    
    SUBSYS:
      CELL:
        A: "[angstrom]"        
        B: "[angstrom]"     
        C: "[angstrom]"
  MOTION:
    PRINT:
      TRAJECTORY:
        FORMAT: XYZ
      RESTART:
        BACKUP_COPIES: 0
      RESTART_HISTORY:
        _: 'OFF'
      CELL:
        _: 'ON'
      VELOCITIES:
        _: 'OFF'
      FORCES:
        _: 'ON'
      STRESS:
        _: 'ON'
    CELL_OPT:
      TYPE: DIRECT_CELL_OPT
